<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Multi-Slot View Generator - Single Tab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        
        .control-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            z-index: 1000;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        input, select, button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            color: white;
            backdrop-filter: blur(10px);
        }
        input::placeholder { color: rgba(255,255,255,0.6); }
        input:focus { outline: 2px solid #667eea; }
        
        .start-btn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .start-btn:hover:not(:disabled) { transform: scale(1.05); }
        .start-btn:disabled { background: #666; cursor: not-allowed; }
        
        .stats {
            margin-left: auto;
            display: flex;
            gap: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .slots-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            padding-top: 70px;
            overflow: hidden;
        }
        
        .slot-frame {
            position: absolute;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }
        
        .slot-frame:hover {
            border-color: #667eea;
            box-shadow: 0 8px 30px rgba(102,126,234,0.4);
            transform: scale(1.02);
        }
        
        .slot-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        .slot-label {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            z-index: 10;
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.9);
            padding: 15px 20px;
            border-radius: 12px;
            backdrop-filter: blur(20px);
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .control-panel { flex-direction: column; gap: 10px; padding: 10px; }
            .stats { margin-left: 0; order: 3; width: 100%; justify-content: center; }
            .slots-container { padding-top: 200px; }
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <input type="url" id="targetUrl" placeholder="https://your-link-here.com" style="flex: 1; min-width: 300px;">
        <input type="number" id="slotCount" value="550" min="50" max="800" style="width: 100px;">
        <input type="number" id="refreshTime" value="10" min="5" max="60" style="width: 80px;">
        <label style="display: flex; align-items: center; gap: 5px; font-size: 13px;">
            <input type="checkbox" id="randomSize" checked> Random Sizes
        </label>
        <button class="start-btn" id="startBtn" onclick="startSlots()">🚀 START SLOTS</button>
        <button class="start-btn" onclick="stopSlots()" id="stopBtn" disabled style="background: #f44336;">⏹️ STOP</button>
        
        <div class="stats">
            <span>🎰 Slots: <span id="activeSlots">0</span></span>
            <span>📊 Views: <span id="totalViews">0</span></span>
            <span>⏱️ Refresh: <span id="refreshTimer">--</span>s</span>
        </div>
    </div>
    
    <div class="slots-container" id="slotsContainer"></div>
    
    <div class="status" id="status">Ready to create 500+ view slots in ONE tab! 🎯</div>

    <script>
        let slots = [];
        let refreshInterval = 10000;
        let totalViews = 0;
        let refreshCountdown = 0;
        let botRunning = false;
        let refreshTimer = null;

        const container = document.getElementById('slotsContainer');

        function startSlots() {
            const url = document.getElementById('targetUrl').value;
            const slotCount = parseInt(document.getElementById('slotCount').value);
            refreshInterval = parseInt(document.getElementById('refreshTime').value) * 1000;
            
            if (!isValidUrl(url)) {
                alert('❌ Please enter a valid URL (https://...)');
                return;
            }
            
            stopSlots(); // Clean up first
            slots = [];
            totalViews = 0;
            botRunning = true;
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('status').textContent = `Creating ${slotCount} slots...`;
            
            createSlots(slotCount, url);
            startRefreshCycle();
        }
        
        function stopSlots() {
            botRunning = false;
            if (refreshTimer) clearTimeout(refreshTimer);
            
            slots.forEach(slot => {
                if (slot.element) {
                    slot.element.remove();
                }
                if (slot.iframe) {
                    slot.iframe.src = '';
                }
            });
            
            slots = [];
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('status').textContent = 'Stopped. Ready to restart!';
            updateStats();
        }
        
        function createSlots(count, url) {
            container.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const slot = createSingleSlot(i + 1, url);
                slots.push(slot);
                container.appendChild(slot.element);
            }
            
            updateStats();
            document.getElementById('status').textContent = `✅ ${count} slots created! Auto-refreshing every ${refreshInterval/1000}s`;
        }
        
        function createSingleSlot(slotNum, url) {
            const randomSize = document.getElementById('randomSize').checked;
            
            // Random sizes for natural look
            const sizes = randomSize ? 
                [[200,150],[250,180],[300,220],[180,140],[220,170]] :
                [[250,180]];
            
            const [width, height] = sizes[Math.floor(Math.random() * sizes.length)];
            
            // Random position
            const maxX = window.innerWidth - width;
            const maxY = window.innerHeight - height - 70;
            const x = Math.random() * maxX;
            const y = 70 + (Math.random() * maxY);
            
            const frame = document.createElement('div');
            frame.className = 'slot-frame';
            frame.style.width = width + 'px';
            frame.style.height = height + 'px';
            frame.style.left = x + 'px';
            frame.style.top = y + 'px';
            
            const label = document.createElement('div');
            label.className = 'slot-label';
            label.textContent = `Slot #${slotNum}`;
            frame.appendChild(label);
            
            const iframe = document.createElement('iframe');
            iframe.className = 'slot-iframe';
            iframe.src = url;
            iframe.sandbox = 'allow-same-origin allow-scripts allow-popups';
            frame.appendChild(iframe);
            
            return {
                element: frame,
                iframe: iframe,
                slotNum: slotNum,
                views: 0,
                x: x,
                y: y,
                width: width,
                height: height
            };
        }
        
        function startRefreshCycle() {
            let timeLeft = refreshInterval / 1000;
            
            function refreshAll() {
                if (!botRunning) return;
                
                // Refresh all iframes
                slots.forEach(slot => {
                    if (slot.iframe) {
                        slot.iframe.src = slot.iframe.src;
                        slot.views++;
                        totalViews++;
                    }
                });
                
                timeLeft = refreshInterval / 1000;
                updateStats();
                
                refreshTimer = setTimeout(refreshAll, refreshInterval);
            }
            
            // Countdown timer
            const countdownInterval = setInterval(() => {
                if (!botRunning) {
                    clearInterval(countdownInterval);
                    return;
                }
                timeLeft--;
                document.getElementById('refreshTimer').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    refreshAll();
                    clearInterval(countdownInterval);
                }
            }, 1000);
        }
        
        function updateStats() {
            const activeSlots = slots.filter(s => s.iframe && s.iframe.contentWindow).length;
            document.getElementById('activeSlots').textContent = activeSlots;
            document.getElementById('totalViews').textContent = totalViews.toLocaleString();
        }
        
        function isValidUrl(url) {
            try {
                new URL(url);
                return url.startsWith('http');
            } catch {
                return false;
            }
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            if (botRunning) {
                // Reposition slots on resize
                slots.forEach(slot => {
                    slot.element.style.left = slot.x + 'px';
                    slot.element.style.top = slot.y + 'px';
                });
            }
        });
    </script>
</body>
</html>
